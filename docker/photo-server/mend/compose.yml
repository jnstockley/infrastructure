---
name: mend
services:
  renovate-ce:
    image: ghcr.io/mend/renovate-ce:15.0.0
    container_name: mend_renovate
    volumes:
      - ./logs:/logs
      - ./certs:/certs
      - ./config.js:/usr/src/app/config.js:ro
    environment:
      LOG_LEVEL: debug
      MEND_RNV_ACCEPT_TOS: Y
    env_file:
      - .env
    networks:
      - proxy
      - private
    restart: unless-stopped
    healthcheck:
      test: curl --fail http://localhost:8080/health || exit 1
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 100s
    labels:
      - traefik.enable=true
      - traefik.http.routers.mend.entrypoints=websecure
      - traefik.http.routers.mend.rule=Host(`mend.jstockley.com`)
      - traefik.http.routers.mend.tls=true
      - traefik.http.routers.mend.tls.certresolver=production
      - traefik.http.routers.mend.service=mend
      - traefik.http.services.mend.loadbalancer.server.port=8080
      - traefik.docker.network=proxy
    security_opt:
      - no-new-privileges:true

networks:
  proxy:
    name: proxy
    external: true
    enable_ipv4: true
    enable_ipv6: true
  private:
    name: private
    internal: true
    external: true
    enable_ipv4: true
    enable_ipv6: true
