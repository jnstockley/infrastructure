---
name: unifi-toolkit
services:
  unifi-toolkit:
    image: ghcr.io/crosstalk-solutions/unifi-toolkit:1.9.11
    container_name: unifi-toolkit
    volumes:
      - ./data:/app/data
    environment:
      - DEPLOYMENT_TYPE=local
      - DATABASE_URL=sqlite+aiosqlite:///./data/unifi_toolkit.db
      - LOG_LEVEL=INFO
      - STALKER_REFRESH_INTERVAL=60
      - UNIFI_VERIFY_SSL=true
    env_file:
      - .env
    networks:
      - private2
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    labels:
      - traefik.enable=true
      - traefik.http.routers.unifi-toolkit.entrypoints=websecure
      - traefik.http.routers.unifi-toolkit.rule=Host(`unifi-toolkit.local.jstockley.com`)
      - traefik.http.routers.unifi-toolkit.tls=true
      - traefik.http.routers.unifi-toolkit.tls.certresolver=production
      - traefik.http.routers.unifi-toolkit.service=authentik-outpost@file
      - traefik.http.routers.unifi-toolkit.middlewares=authentik-proxy-chain@file

networks:
  private2:
    name: private2
    internal: true
    external: true
