---
name: bsn
services:
  bsn:
    image: jnstockley/bsn:v4.0.0b3
    container_name: bsn
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    environment:
      - LOG_LEVEL=DEBUG
      - ALLOW_SHORTS=False
      - INTERVAL=15
      - TZ=America/Chicago
    env_file:
      - .env
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
