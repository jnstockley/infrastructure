---
name: kestra
services:
  kestra:
    image: kestra/kestra:v1.3.3
    container_name: kestra
    volumes:
      - ./data:/app/storage
      - /var/run/docker.sock:/var/run/docker.sock
      - /tmp/kestra-wd:/tmp/kestra-wd
      - ./config/application.yml:/etc/config/application.yml
    env_file:
      - .env
    networks:
      - proxy
      - private
    command: server standalone --worker-thread=128 --config /etc/config/application.yml
    restart: unless-stopped
    labels:
      - traefik.enable=true
      - traefik.http.routers.kestra.entrypoints=websecure
      - traefik.http.routers.kestra.rule=Host(`kestra.jstockley.com`) || Host(`kestra.local.jstockley.com`)
      - traefik.http.routers.kestra.tls=true
      - traefik.http.routers.kestra.tls.certresolver=production
      - traefik.http.routers.kestra.service=kestra
      - traefik.http.services.kestra.loadbalancer.server.port=8080
    # Note that this setup with a root user is intended for development purpose.
    # Our base image runs without root, but the Docker Compose implementation needs root to access the Docker socket
    user: "root"
    pull_policy: always
    security_opt:
      - no-new-privileges:true
    # Kestra, by default, has a termination grace period of 5m. We need to wait a little more to be sure no active tasks are running.
    stop_grace_period: 6m

networks:
  proxy:
    name: proxy
    external: true
  private:
    name: private
    internal: true
    external: true
