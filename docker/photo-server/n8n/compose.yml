---
name: n8n
services:
  n8nio:
    image: docker.n8n.io/n8nio/n8n:2.20.6
    container_name: n8n
    volumes:
      - ./data:/home/node/.n8n
    environment:
      - N8N_RUNNERS_ENABLED=true
      - N8N_ENFORCE_SETTINGS_FILE_PERMISSIONS=true
      - TZ=America/Chicago
      - GENERIC_TIMEZONE=America/Chicago
    env_file:
      - .env
    networks:
      - proxy2
      - private2
    restart: unless-stopped
    labels:
      - traefik.enable=true
      - traefik.http.routers.n8n.entrypoints=websecure
      - traefik.http.routers.n8n.rule=Host(`n8n.local.jstockley.com`) || Host(`n8n.jstockley.com`)
      - traefik.http.routers.n8n.tls=true
      - traefik.http.routers.n8n.tls.certresolver=production
      - traefik.http.routers.n8n.service=n8n
      - traefik.http.services.n8n.loadbalancer.server.port=5678
      - traefik.docker.network=proxy2

networks:
  proxy2:
    name: proxy2
    external: true
  private2:
    name: private2
    internal: true
    external: true
