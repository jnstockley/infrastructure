---
name: paperless-ngx
services:
  nc-sync:
    image: flor1der/paperless-nextcloud-sync:1.2.0
    depends_on:
      - webserver
    volumes:
      - /home/jackstockley/infrastructure/docker/photo-server/paperless/media/documents/archive:/mnt/source:ro
      - ./nc-sync-logs/:/var/log/
    environment:
      - USERMAP_UID=1000
      - USERMAP_GID=1000
      - PAPERLESS_TIME_ZONE=America/Chicago
      - PAPERLESS_OCR_LANGUAGE=eng
      - PAPERLESS_REDIS=redis://redis:6379/2
      - PAPERLESS_FILENAME_FORMAT={{ created_year }}/{{ title }}
      - PAPERLESS_ENABLE_ALLAUTH=true
      - PAPERLESS_APPS=allauth.socialaccount.providers.openid_connect
      - PAPERLESS_AUTO_LOGIN=true
      - PAPERLESS_AUTO_CREATE=true
      - TZ=America/Chicago
    env_file:
      - .env
    restart: unless-stopped
    devices:
      - /dev/fuse
    privileged: true

  webserver:
    image: ghcr.io/paperless-ngx/paperless-ngx:2.20.15
    container_name: paperless-ngx
    volumes:
      - ./data:/usr/src/paperless/data
      - ./media:/usr/src/paperless/media
      - ./export:/usr/src/paperless/export
      - ./consume:/usr/src/paperless/consume
    environment:
      - USERMAP_UID=1000
      - USERMAP_GID=1000
      - PAPERLESS_TIME_ZONE=America/Chicago
      - PAPERLESS_OCR_LANGUAGE=eng
      - PAPERLESS_REDIS=redis://redis:6379/2
      - PAPERLESS_FILENAME_FORMAT={{ created_year }}/{{ title }}
      - PAPERLESS_ENABLE_ALLAUTH=true
      - PAPERLESS_APPS=allauth.socialaccount.providers.openid_connect
      - PAPERLESS_AUTO_LOGIN=true
      - PAPERLESS_AUTO_CREATE=true
      - TZ=America/Chicago
    env_file:
      - .env
    networks:
      - proxy
      - private
    restart: unless-stopped
    labels:
      - traefik.enable=true
      - traefik.http.routers.paperless.entrypoints=websecure
      - traefik.http.routers.paperless.rule=Host(`paperless.local.jstockley.com`)
      - traefik.http.routers.paperless.tls=true
      - traefik.http.routers.paperless.tls.certresolver=production
      - traefik.http.routers.paperless.service=paperless
      - traefik.http.services.paperless.loadbalancer.server.port=8000
      - traefik.docker.network=proxy
    security_opt:
      - no-new-privileges:true

networks:
  proxy:
    name: proxy
    external: true
  private:
    name: private
    internal: true
    external: true
