---
name: authentik
services:
  server:
    image: ghcr.io/goauthentik/server:2026.2.1
    container_name: authentik
    volumes:
      - ./media:/media
      - ./custom-templates:/templates
    environment:
      - TZ=America/Chicago
    env_file:
      - .env
    networks:
      - proxy
      - private
    command: server
    restart: unless-stopped
    healthcheck:
      test: ak healthcheck
      interval: 60s
      retries: 5
      start_period: 180s
      timeout: 30s
    labels:
      # ── Authentik UI / API ───────────────────────────────────────────────────
      - traefik.enable=true
      - traefik.http.routers.auth.entrypoints=websecure
      - traefik.http.routers.auth.rule=Host(`idp.jstockley.com`)
      - traefik.http.routers.auth.tls=true
      - traefik.http.routers.auth.tls.certresolver=production
      - traefik.http.routers.auth.service=auth
      - traefik.http.services.auth.loadbalancer.server.port=9000
      # ── Embedded Outpost callbacks ───────────────────────────────────────────
      # Catches /outpost.goauthentik.io/* paths on ANY hostname so that the
      # login-flow redirects (injected into proxied responses by the outpost)
      # always resolve correctly, regardless of which app domain is active.
      - traefik.http.routers.auth-outpost-cb.entrypoints=websecure
      - traefik.http.routers.auth-outpost-cb.rule=PathPrefix(`/outpost.goauthentik.io/`)
      - traefik.http.routers.auth-outpost-cb.tls=true
      - traefik.http.routers.auth-outpost-cb.tls.certresolver=production
      - traefik.http.routers.auth-outpost-cb.service=auth
      - traefik.http.routers.auth-outpost-cb.priority=10
    security_opt:
      - no-new-privileges:true

  worker:
    image: ghcr.io/goauthentik/server:2026.2.1
    container_name: authentik_worker
    volumes:
      - ./media:/media
      - ./certs:/certs
      - ./custom-templates:/templates
    environment:
      - TZ=America/Chicago
    env_file:
      - .env
    networks:
      - private
    command: worker
    restart: unless-stopped
    healthcheck:
      test: ak healthcheck
      interval: 60s
      retries: 5
      start_period: 180s
      timeout: 30s
    user: root
    security_opt:
      - no-new-privileges:true

networks:
  proxy:
    external: true
    name: proxy
  private:
    name: private
    internal: true
    external: true
