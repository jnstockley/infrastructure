---
name: arcane-agent
services:
  arcane-agent:
    image: ghcr.io/getarcaneapp/agent:v2.3.2
    container_name: arcane-agent
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./data:/app/data
      - /home/jackstockley/infrastructure/docker/racknerd:/app/data/projects
    environment:
      EDGE_AGENT: "true"
      EDGE_TRANSPORT: "poll"
      MANAGER_API_URL: "https://arcane.local.jstockley.com"
      TZ: "America/Chicago"
    env_file:
      - .env
    restart: unless-stopped
