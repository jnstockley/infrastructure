---
name: postgres
services:
  databasus:
    image: databasus/databasus:v3.39.1
    container_name: databasus
    depends_on:
      - postgres
    volumes:
      - ./databasus-data:/databasus-data
    environment:
      - TZ=America/Chicago
      - PGTZ=America/Chicago
    networks:
      - proxy
      - private
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4005"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    labels:
      - traefik.enable=true
      - traefik.docker.network=proxy
      - traefik.http.routers.databasus.entrypoints=websecure
      - traefik.http.routers.databasus.rule=Host(`databasus.jstockley.com`)
      - traefik.http.routers.databasus.tls=true
      - traefik.http.routers.databasus.tls.certresolver=production
      - traefik.http.routers.databasus.service=databasus
      - traefik.http.services.databasus.loadbalancer.server.port=4005
    security_opt:
      - no-new-privileges:true

  pg-admin:
    image: dpage/pgadmin4:9.15.0
    container_name: pgadmin
    depends_on:
      - postgres
    volumes:
      - ./pgadmin:/var/lib/pgadmin
      - ./config_local.py:/pgadmin4/config_local.py
    environment:
      - TZ=America/Chicago
      - PGTZ=America/Chicago
    env_file:
      - .env
    networks:
      - proxy
      - private
    restart: unless-stopped
    healthcheck:
      test: wget -nv -t 1 --spider http://localhost:80/misc/ping || exit 1
      interval: 60s
      retries: 5
      start_period: 20s
      timeout: 10s
    labels:
      - traefik.enable=true
      - traefik.docker.network=proxy
      - traefik.http.routers.pgadmin.entrypoints=websecure
      - traefik.http.routers.pgadmin.rule=Host(`pgadmin.jstockley.com`)
      - traefik.http.routers.pgadmin.tls=true
      - traefik.http.routers.pgadmin.tls.certresolver=production
      - traefik.http.routers.pgadmin.service=pgadmin
      - traefik.http.services.pgadmin.loadbalancer.server.port=80
    security_opt:
      - no-new-privileges:true

  postgres:
    image: postgres:18.3-alpine
    container_name: postgres
    volumes:
      - ./postgres:/var/lib/postgresql/18/docker
    environment:
      - TZ=America/Chicago
      - PGTZ=America/Chicago
    env_file:
      - .env
    networks:
      - private
    restart: unless-stopped
    healthcheck:
      test: pg_isready -U jackstockley
      interval: 60s
      retries: 5
      start_period: 20s
      timeout: 10s
    security_opt:
      - no-new-privileges:true

networks:
  proxy:
    name: proxy
    external: true
    enable_ipv4: true
    enable_ipv6: true
  private:
    name: private
    internal: true
    external: true
    enable_ipv4: true
    enable_ipv6: true
