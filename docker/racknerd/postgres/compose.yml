---
name: postgres
services:
  databasus:
    image: databasus/databasus:v3.22.0
    container_name: databasus
    depends_on:
      - postgres-db
    volumes:
      - ./databasus-data:/databasus-data
    networks:
      - postgres
      - databasus
    restart: unless-stopped
    labels:
      - traefik.enable=true
      - traefik.http.routers.databasus.entrypoints=websecure
      - traefik.http.routers.databasus.rule=Host(`databasus.jstockley.com`)
      - traefik.http.routers.databasus.tls=true
      - traefik.http.routers.databasus.tls.certresolver=production
      - traefik.http.routers.databasus.service=databasus
      - traefik.http.services.databasus.loadbalancer.server.port=4005

  pg-admin:
    image: dpage/pgadmin4:9.13.0
    container_name: pgadmin
    depends_on:
      - postgres
    volumes:
      - ./pgadmin:/var/lib/pgadmin
      - ./config_local.py:/pgadmin4/config_local.py
    environment:
      - TZ=America/Chicago
    env_file:
      - .env
    networks:
      - postgres
      - pgadmin
      - wireguard
    restart: unless-stopped
    healthcheck:
      test: wget -nv -t 1 --spider http://localhost:80/misc/ping || exit 1
      interval: 60s
      retries: 5
      start_period: 20s
      timeout: 10s
    labels:
      - traefik.enable=true
      - traefik.http.routers.pgadmin.entrypoints=websecure
      - traefik.http.routers.pgadmin.rule=Host(`pgadmin.jstockley.com`)
      - traefik.http.routers.pgadmin.tls=true
      - traefik.http.routers.pgadmin.tls.certresolver=production
      - traefik.http.routers.pgadmin.service=pgadmin
      - traefik.http.services.pgadmin.loadbalancer.server.port=80
      - traefik.docker.network=pgadmin
    security_opt:
      - no-new-privileges:true

  postgres:
    image: postgres:18.3-alpine
    container_name: postgres
    volumes:
      - ./postgres:/var/lib/postgresql/18/docker
    environment:
      - TZ=America/Chicago
    env_file:
      - .env
    networks:
      - postgres
      - wireguard
    restart: unless-stopped
    healthcheck:
      test: pg_isready -U jackstockley
      interval: 60s
      retries: 5
      start_period: 20s
      timeout: 10s
    security_opt:
      - no-new-privileges:true

networks:
  postgres:
    name: postgres
    external: true
  pgadmin:
    external: true
    name: pgadmin
  databasus:
    name: databasus
    external: true
  wireguard:
    name: wireguard
    external: true
