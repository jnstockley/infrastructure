---
name: Cleanup Closed Alerts

on:
  workflow_dispatch:

jobs:
  cleanup-closed-alerts:
    name: Cleanup Closed Alerts
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
      actions: read
    steps:
      - name: Step 1 - Delete old analyses to remove closed alerts
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          REPO="${{ github.repository }}"

          echo "Fetching all analyses..."
          all_analyses=$(gh api "repos/$REPO/code-scanning/analyses" --paginate)

          # Get unique categories
          categories=$(echo "$all_analyses" | jq -r '[.[].category] | unique | .[]')

          if [ -z "$categories" ]; then
            echo "No analyses found, nothing to clean up."
            exit 0
          fi

          while IFS= read -r category; do
            echo "Processing category: $category"

            # Get all analysis IDs for this category sorted newest-to-oldest, skip the first (most recent)
            mapfile -t old_ids < <(echo "$all_analyses" \
              | jq -r --arg c "$category" \
                '[.[] | select(.category == $c)] | sort_by(.created_at) | reverse | .[1:][].id')

            if [ ${#old_ids[@]} -eq 0 ]; then
              echo "  Only one analysis exists, skipping."
              continue
            fi

            for id in "${old_ids[@]}"; do
              echo "  Deleting old analysis $id"
              gh api --method DELETE "repos/$REPO/code-scanning/analyses/$id?confirm_delete" \
                --silent && echo "  Deleted $id" || echo "  Failed to delete $id"
            done
          done <<< "$categories"

