---
name: Cleanup Closed Alerts

on:
  workflow_dispatch:

jobs:
  cleanup-closed-alerts:
    name: Cleanup Closed Alerts
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
      actions: read
    steps:
      - name: Step 1 - Dismiss all open code scanning alerts
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set +e
          REPO="${{ github.repository }}"

          # Step 1: Dismiss all open alerts so they don't re-open after analyses are deleted
          echo "=== Dismissing all open alerts ==="
          alert_numbers=$(gh api "repos/$REPO/code-scanning/alerts?state=open&per_page=100" \
            --paginate | jq -r '.[].number')

          if [ -z "$alert_numbers" ]; then
            echo "No open alerts found."
          else
            while IFS= read -r number; do
              gh api --method PATCH "repos/$REPO/code-scanning/alerts/$number" \
                -f state=dismissed \
                -f dismissed_reason="won't fix" \
                -f dismissed_comment="Dismissed via automated cleanup" \
                --silent \
                && echo "  Dismissed #$number" \
                || echo "  Failed to dismiss #$number"
            done <<< "$alert_numbers"
          fi

          # Step 2: For each category, follow the next_analysis_url chain to delete everything
          echo ""
          echo "=== Deleting all analyses ==="
          all_analyses=$(gh api "repos/$REPO/code-scanning/analyses" --paginate)
          categories=$(echo "$all_analyses" | jq -r '[.[].category] | unique | .[]')

          if [ -z "$categories" ]; then
            echo "No analyses found."
            exit 0
          fi

          while IFS= read -r category; do
            echo "Processing category: $category"

            # Start with the oldest analysis for this category
            start_id=$(echo "$all_analyses" \
              | jq -r --arg c "$category" \
                '[.[] | select(.category == $c)] | sort_by(.created_at) | first | .id')

            [ -z "$start_id" ] || [ "$start_id" = "null" ] && continue

            current_id="$start_id"
            while [ -n "$current_id" ] && [ "$current_id" != "null" ]; do
              echo "  Deleting analysis $current_id"
              response=$(gh api --method DELETE \
                "repos/$REPO/code-scanning/analyses/$current_id?confirm_delete=true" \
                2>&1)
              status=$?

              if [ $status -eq 0 ]; then
                echo "  Deleted $current_id"
                current_id=$(echo "$response" | jq -r '.next_analysis_url // empty' \
                  | grep -oP '(?<=/analyses/)\d+')
              else
                echo "  Failed to delete $current_id: $response"
                break
              fi
            done
          done <<< "$categories"

          echo ""
          echo "Done."
