---
name: Cleanup Closed Alerts

on:
  workflow_dispatch:

jobs:
  cleanup-closed-alerts:
    name: Cleanup Closed Alerts
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
      actions: read
    steps:
      - name: Step 1 - Dismiss all open code scanning alerts
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set +e
          REPO="${{ github.repository }}"

          echo "Fetching all open alerts..."
          alert_numbers=$(gh api "repos/$REPO/code-scanning/alerts?state=open&per_page=100" \
            --paginate | jq -r '.[].number')

          if [ -z "$alert_numbers" ]; then
            echo "No open alerts found, nothing to dismiss."
            exit 0
          fi

          while IFS= read -r number; do
            echo "  Dismissing alert #$number"
            gh api --method PATCH "repos/$REPO/code-scanning/alerts/$number" \
              -f state=dismissed \
              -f dismissed_reason="won't fix" \
              -f dismissed_comment="Dismissed via automated cleanup" \
              --silent \
              && echo "  Dismissed #$number" \
              || echo "  Failed to dismiss #$number"
          done <<< "$alert_numbers"

          echo "Done. All open alerts have been dismissed."

