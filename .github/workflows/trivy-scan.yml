---
name: Trivy Security Scanning

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 6 * * 1'
  workflow_dispatch:

jobs:
  trivy-fs-scan:
    name: "Trivy · Filesystem (Deps, Secrets, Misconfig)"
    runs-on: ubuntu-latest

    permissions:
      contents: read
      security-events: write
      actions: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      # The trivy-action automatically caches the Trivy vulnerability DB
      # between runs, which saves 30–60 seconds on repeat scans.
      - name: Run Trivy filesystem scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: 'fs'
          scan-ref: '.'
          scanners: 'vuln,secret,misconfig'
          format: 'sarif'
          output: 'trivy-fs-results.sarif'
          severity: 'CRITICAL,HIGH'
          ignore-unfixed: true
          trivy-config: 'trivy/trivy.yaml'

      - name: Upload filesystem scan results to GitHub Security tab
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: 'trivy-fs-results.sarif'
          category: 'trivy-filesystem'

  trivy-docker-images:
    name: "Trivy · Docker Image CVE Scanning"
    environment: security
    runs-on: ubuntu-latest

    permissions:
      contents: read
      security-events: write
      actions: read
      id-token: write  # required for OIDC authentication with Infisical

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install Trivy
        uses: aquasecurity/setup-trivy@v0.2.6
        with:
          cache: true

      # Extract every unique `image:` value from docker-compose files.
      # Filters out lines with shell variable interpolation (${VAR}) because
      # those can't be resolved in CI without the full runtime environment.
      - name: Extract Docker image list from compose files
        id: extract
        run: |
          IMAGE_LIST=$(
            grep -rh "^\s*image:" docker/ 2>/dev/null \
              | sed "s/.*image:[[:space:]]*//" \
              | tr -d "\"'" \
              | sed 's/[[:space:]]*$//' \
              | grep -v '^\$' \
              | grep -v '^\${' \
              | sort -u
          )

          if [ -z "$IMAGE_LIST" ]; then
            echo "::warning::No static image references found in docker/. " \
                 "Images using \${VARIABLE} syntax cannot be scanned in CI."
            exit 0
          fi

          echo "Images to scan:"
          printf '%s\n' "$IMAGE_LIST"
          printf '%s\n' "$IMAGE_LIST" > /tmp/images.txt

      - name: Fetch secrets from Infisical
        uses: Infisical/secrets-action@v1.0.16
        with:
          method: "oidc"
          identity-id: '560c0540-b603-4725-a149-e1270a08a6db'
          domain: "https://secrets.jstockley.com"
          project-slug: ${{ github.event.repository.name }}
          env-slug: "security"

      - name: Log in to Docker Hub
        if: steps.dockerfile_check.outputs.exists == 'true'
        uses: docker/login-action@v4
        with:
          username: ${{ env.DOCKER_USERNAME }}
          password: ${{ env.DOCKER_PASSWORD }}

      # Scan each image individually and write a per-image SARIF file.
      # --exit-code 0 means the step never fails due to findings alone;
      # the SARIF upload is what surfaces the results in the Security tab.
      - name: Scan each Docker image
        run: |
          mkdir -p sarif-results

          if [ ! -f /tmp/images.txt ]; then
            echo "No images.txt found — skipping image scans."
            exit 0
          fi

          while IFS= read -r image; do
            [ -z "$image" ] && continue
            safe_name=$(printf '%s' "$image" | tr '/:.@' '----' | tr -cd '[:alnum:]-_')
            echo "::group::Scanning image: $image"
            trivy image \
              --format sarif \
              --output "sarif-results/${safe_name}.sarif" \
              --severity CRITICAL,HIGH \
              --ignore-unfixed \
              --scanners vuln \
              --exit-code 0 \
              "$image"
            echo "::endgroup::"
          done < /tmp/images.txt

      - name: Combine SARIF files into one
        if: always()
        run: |
          mkdir -p sarif-results

          if [ -z "$(ls -A sarif-results/*.sarif 2>/dev/null)" ]; then
            # No images were scanned — write an empty SARIF so GitHub
            # reconciles and auto-closes any previously open alerts
            echo "No SARIF files found — writing empty SARIF for reconciliation."
            cat > combined.sarif << 'EOF'
          {
            "$schema": "https://json.schemastore.org/sarif-2.1.0.json",
            "version": "2.1.0",
            "runs": [{
              "tool": { "driver": { "name": "trivy", "rules": [] } },
              "results": []
            }]
          }
          EOF
          else
            # Merge all per-image SARIF files into a single run.
            # Rules are deduplicated by ID (same CVE can appear across images).
            # Results from all images are concatenated into one results array.
            jq -s '{
              "$schema": "https://json.schemastore.org/sarif-2.1.0.json",
              "version": "2.1.0",
              "runs": [{
                "tool": {
                  "driver": {
                    "name": "trivy",
                    "informationUri": "https://trivy.dev",
                    "rules": ([ .[].runs[].tool.driver.rules // [] ] | add // [] | unique_by(.id))
                  }
                },
                "results": [ .[].runs[].results // [] | .[] ]
              }]
            }' sarif-results/*.sarif > combined.sarif
          fi

          echo "Combined SARIF stats:"
          jq '{rules: .runs[0].tool.driver.rules | length, results: .runs[0].results | length}' combined.sarif

      - name: Upload combined SARIF to GitHub Security tab
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: combined.sarif
          category: trivy-docker-images

  trivy-terraform:
    name: "Trivy · Terraform IaC Misconfiguration Scan"
    runs-on: ubuntu-latest

    permissions:
      contents: read
      security-events: write
      actions: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Run Trivy config scan on Terraform
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: 'config'
          scan-ref: 'tf/'
          format: 'sarif'
          output: 'trivy-terraform-results.sarif'
          severity: 'CRITICAL,HIGH'
          hide-progress: true
          trivy-config: 'trivy/trivy.yaml'
          ignore-unfixed: true

      - name: Upload Terraform scan results to GitHub Security tab
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: 'trivy-terraform-results.sarif'
          category: 'trivy-terraform'
