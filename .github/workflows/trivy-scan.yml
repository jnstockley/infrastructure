---
name: Trivy Security Scanning

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 6 * * 1'
  workflow_dispatch:

jobs:
  trivy-fs-scan:
    name: "Trivy · Filesystem (Deps, Secrets, Misconfig)"
    runs-on: ubuntu-latest

    permissions:
      contents: read
      security-events: write
      actions: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      # The trivy-action automatically caches the Trivy vulnerability DB
      # between runs, which saves 30–60 seconds on repeat scans.
      - name: Run Trivy filesystem scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: 'fs'
          scan-ref: '.'
          scanners: 'vuln,secret,misconfig'
          format: 'sarif'
          output: 'trivy-fs-results.sarif'
          severity: 'CRITICAL,HIGH,MEDIUM'
          ignore-unfixed: true
          trivy-config: 'trivy/trivy.yaml'

      - name: Upload filesystem scan results to GitHub Security tab
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: 'trivy-fs-results.sarif'
          category: 'trivy-filesystem'

  trivy-docker-images:
    name: "Trivy · Docker Image CVE Scanning"
    runs-on: ubuntu-latest

    permissions:
      contents: read
      security-events: write
      actions: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install Trivy
        uses: aquasecurity/setup-trivy@v0.2.6
        with:
          cache: true

      # Extract every unique `image:` value from docker-compose files.
      # Filters out lines with shell variable interpolation (${VAR}) because
      # those can't be resolved in CI without the full runtime environment.
      - name: Extract Docker image list from compose files
        id: extract
        run: |
          IMAGE_LIST=$(
            grep -rh "^\s*image:" docker/ 2>/dev/null \
              | sed "s/.*image:[[:space:]]*//" \
              | tr -d "\"'" \
              | sed 's/[[:space:]]*$//' \
              | grep -v '^\$' \
              | grep -v '^\${' \
              | sort -u
          )

          if [ -z "$IMAGE_LIST" ]; then
            echo "::warning::No static image references found in docker/. " \
                 "Images using \${VARIABLE} syntax cannot be scanned in CI."
            exit 0
          fi

          echo "Images to scan:"
          printf '%s\n' "$IMAGE_LIST"
          printf '%s\n' "$IMAGE_LIST" > /tmp/images.txt

      # Scan each image individually and write a per-image SARIF file.
      # --exit-code 0 means the step never fails due to findings alone;
      # the SARIF upload is what surfaces the results in the Security tab.
      - name: Scan each Docker image
        run: |
          mkdir -p sarif-results

          if [ ! -f /tmp/images.txt ]; then
            echo "No images.txt found — skipping image scans."
            exit 0
          fi

          while IFS= read -r image; do
            [ -z "$image" ] && continue

            # Build a filesystem-safe filename from the image reference
            safe_name=$(printf '%s' "$image" | tr '/:.@' '----' | tr -cd '[:alnum:]-_')
            sarif_out="sarif-results/${safe_name}.sarif"

            echo "::group::Scanning image: $image"
            trivy image \
              --format sarif \
              --output "$sarif_out" \
              --severity CRITICAL,HIGH,MEDIUM \
              --ignore-unfixed \
              --scanners vuln \
              --exit-code 0 \
              "$image"
            echo "::endgroup::"

          done < /tmp/images.txt

      # -----------------------------------------------------------------------
      # Step 1 — Close alerts for images no longer in any compose file
      # Queries the GitHub Code Scanning API for all existing trivy-docker-*
      # categories, then uploads an empty SARIF for any that are no longer
      # represented in the current scan output. This signals to GitHub that
      # those images are gone and their alerts should be auto-closed.
      # -----------------------------------------------------------------------
      - name: Close alerts for removed images
        if: always()
        run: |
          # Build the set of categories we are about to upload
          declare -A current_categories
          if [ -d sarif-results ]; then
            for sarif_file in sarif-results/*.sarif; do
              [ -f "$sarif_file" ] || continue
              label=$(basename "$sarif_file" .sarif)
              current_categories["trivy-docker-${label}"]=1
            done
          fi

          echo "Currently active categories:"
          printf '  %s\n' "${!current_categories[@]}"

          # Fetch all existing trivy-docker-* categories from the API.
          # --paginate handles repos with many images across many commits.
          existing_categories=$(gh api \
            --paginate \
            -H "Accept: application/vnd.github+json" \
            "/repos/${{ github.repository }}/code-scanning/analyses?tool_name=trivy&per_page=100" \
            --jq '.[].category | select(startswith("trivy-docker-"))' \
            2>/dev/null | sort -u || true)

          if [ -z "$existing_categories" ]; then
            echo "No existing trivy-docker-* categories found — nothing to close."
            exit 0
          fi

          # Write a valid empty SARIF once; reuse it for each stale category.
          # An empty `results` array with no rules tells GitHub the scan ran
          # cleanly but found no subjects — triggering alert auto-close.
          cat > /tmp/empty.sarif << 'EOF'
          {
            "$schema": "https://json.schemastore.org/sarif-2.1.0.json",
            "version": "2.1.0",
            "runs": [{
              "tool": { "driver": { "name": "trivy", "rules": [] } },
              "results": []
            }]
          }
          EOF

          while IFS= read -r category; do
            [ -z "$category" ] && continue

            if [ -n "${current_categories[$category]+_}" ]; then
              echo "Category still active — skipping: $category"
              continue
            fi

            echo "Closing stale category: $category"
            gh api \
              --method POST \
              -H "Accept: application/vnd.github+json" \
              /repos/${{ github.repository }}/code-scanning/sarifs \
              -f commit_sha="${{ github.sha }}" \
              -f ref="${{ github.ref }}" \
              -f sarif="$(gzip -c /tmp/empty.sarif | base64 -w 0)" \
              -f tool_name="trivy" \
              -f category="$category"

            echo "  ↳ Empty SARIF uploaded — alerts will auto-close."
          done <<< "$existing_categories"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # -----------------------------------------------------------------------
      # Step 2 — Upload results for currently active images (one category each)
      # -----------------------------------------------------------------------
      - name: Upload Docker image scan results
        if: always()
        run: |
          if [ ! -d sarif-results ] || [ -z "$(ls -A sarif-results/ 2>/dev/null)" ]; then
            echo "No SARIF files to upload — skipping."
            exit 0
          fi

          for sarif_file in sarif-results/*.sarif; do
            [ -f "$sarif_file" ] || continue
            image_label=$(basename "$sarif_file" .sarif)
            echo "Uploading SARIF for: $image_label"

            gh api \
              --method POST \
              -H "Accept: application/vnd.github+json" \
              /repos/${{ github.repository }}/code-scanning/sarifs \
              -f commit_sha="${{ github.sha }}" \
              -f ref="${{ github.ref }}" \
              -f sarif="$(gzip -c "$sarif_file" | base64 -w 0)" \
              -f tool_name="trivy" \
              -f category="trivy-docker-${image_label}"
          done
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  trivy-terraform:
    name: "Trivy · Terraform IaC Misconfiguration Scan"
    runs-on: ubuntu-latest

    permissions:
      contents: read
      security-events: write
      actions: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Run Trivy config scan on Terraform
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: 'config'
          scan-ref: 'tf/'
          format: 'sarif'
          output: 'trivy-terraform-results.sarif'
          severity: 'CRITICAL,HIGH,MEDIUM'
          hide-progress: true
          trivy-config: 'trivy/trivy.yaml'

      - name: Upload Terraform scan results to GitHub Security tab
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: 'trivy-terraform-results.sarif'
          category: 'trivy-terraform'
