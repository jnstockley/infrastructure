---
name: Security Scan

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * *'
  push:
    branches:
      - main

jobs:
  iac:
    permissions:
      contents: read  # for actions/checkout to fetch code
      security-events: write  # for github/codeql-action/upload-sarif to upload SARIF results
      actions: read  # only required for a private repository by github/codeql-action/upload-sarif to get the Action run status
    name: IaC Scan
    runs-on: ubuntu-latest
    steps:
      - name: Step 1 - Checkout code
        uses: actions/checkout@v6
      - name: Step 2 - Run Trivy vulnerability scanner in IaC mode
        uses: aquasecurity/trivy-action@0.35.0
        with:
          scan-type: 'config'
          ignore-unfixed: true
          hide-progress: true
          format: 'sarif'
          output: 'trivy-results.sarif'
          exit-code: '1'
          severity: 'CRITICAL,HIGH'
      - name: Step 3 - Tag SARIF results
        run: |
          jq '.runs |= map(.tool.driver.name = "trivy-iac")' \
            trivy-results.sarif > trivy-tagged.sarif && mv trivy-tagged.sarif trivy-results.sarif
      - name: Step 4 - Upload Trivy scan results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: 'trivy-results.sarif'

  discover-images:
    name: Discover Docker Images
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      images: ${{ steps.extract.outputs.images }}
    steps:
      - name: Step 1 - Checkout code
        uses: actions/checkout@v6
      - name: Step 2 - Extract images from compose files
        id: extract
        run: |
          images=$(grep -rh "image:" docker/ --include="compose.yml" \
            | grep -v '\${' \
            | sed 's/.*image:[[:space:]]*//' \
            | sort -u \
            | jq -R -s -c '[split("\n")[] | select(length > 0)]')
          echo "images=$images" >> $GITHUB_OUTPUT

  image-scan:
    name: Image Scan
    needs: discover-images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
      actions: read
    strategy:
      fail-fast: false
      matrix:
        image: ${{ fromJson(needs.discover-images.outputs.images) }}
    steps:
      - name: Step 1 - Run Trivy vulnerability scanner on ${{ matrix.image }}
        uses: aquasecurity/trivy-action@0.35.0
        with:
          image-ref: ${{ matrix.image }}
          format: 'template'
          template: '@/contrib/sarif.tpl'
          output: 'trivy-results.sarif'
          scanners: 'vuln,secret'
          severity: 'CRITICAL,HIGH'
          ignore-unfixed: true
      - name: Step 2 - Compute image name without tag
        id: image-name
        env:
          IMAGE: ${{ matrix.image }}
        run: |
          image_no_tag=$(echo "$IMAGE" | sed 's/:[^/:]*$//')
          echo "value=$image_no_tag" >> $GITHUB_OUTPUT
      - name: Step 3 - Tag SARIF results
        env:
          IMAGE_NO_TAG: ${{ steps.image-name.outputs.value }}
        run: |
          jq --arg image "$IMAGE_NO_TAG" '
            .runs |= map(
              .tool.driver.name = "trivy-image" |
              if .tool.driver.rules then
                .tool.driver.rules |= map(
                  .properties.tags = ((.properties.tags // []) + ["image", $image])
                )
              else . end
            )
          ' trivy-results.sarif > trivy-tagged.sarif && mv trivy-tagged.sarif trivy-results.sarif
      - name: Step 4 - Upload Trivy image scan results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: 'trivy-results.sarif'
          category: '${{ steps.image-name.outputs.value }}'

  host-scan-racknerd:
    name: Host Scan - Racknerd
    runs-on: ubuntu-latest
    environment: racknerd
    permissions:
      contents: read
      security-events: write
      actions: read
    steps:
      - name: Step 1 - Run Trivy on Racknerd
        uses: jnstockley/gh-ssh-action@v1.2.12
        with:
          host: ${{ secrets.IP }}
          username: jackstockley
          private_key: ${{ secrets.SSH_KEY }}
          command: cd ~/infrastructure/trivy && git reset --hard origin/main && git pull && docker compose up
      - name: Step 2 - Copy SARIF results from Racknerd and delete remote copy
        env:
          SSH_KEY: ${{ secrets.SSH_KEY }}
          SSH_HOST: ${{ secrets.IP }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$SSH_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          printf 'StrictHostKeyChecking no\nUserKnownHostsFile /dev/null\n' > ~/.ssh/config
          scp jackstockley@"$SSH_HOST":~/infrastructure/trivy/trivy-results.sarif trivy-results.sarif
          ssh jackstockley@"$SSH_HOST" "rm -f ~/infrastructure/trivy/trivy-results.sarif"
          rm -f ~/.ssh/id_rsa
      - name: Step 3 - Tag SARIF results
        run: |
          jq '
            .runs |= map(
              .tool.driver.name = "trivy-host" |
              if .tool.driver.rules then
                .tool.driver.rules |= map(
                  .properties.tags = ((.properties.tags // []) + ["host", "racknerd"])
                )
              else . end
            )
          ' trivy-results.sarif > trivy-tagged.sarif && mv trivy-tagged.sarif trivy-results.sarif
      - name: Step 4 - Upload Trivy host scan results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'
          category: 'racknerd'

  host-scan-photo-server:
    name: Host Scan - Photo Server
    runs-on: ubuntu-latest
    environment: photo-server
    permissions:
      contents: read
      security-events: write
      actions: read
    steps:
      - name: Step 1 - WireGuard Connection
        run: |
          sudo apt-get update
          sudo apt-get install -y wireguard resolvconf
          echo "${{ secrets.VPN }}" > wg0.conf
          sudo chmod 600 wg0.conf
          sudo cp wg0.conf /etc/wireguard/
          sudo wg-quick up wg0
      - name: Step 2 - Run Trivy on Photo Server
        uses: jnstockley/gh-ssh-action@v1.2.12
        with:
          host: photo-server.internal.jstockley.com
          username: jackstockley
          private_key: ${{ secrets.SSH_KEY }}
          command: cd ~/infrastructure/trivy && git reset --hard origin/main && git pull && docker compose up
      - name: Step 3 - Copy SARIF results from Photo Server and delete remote copy
        env:
          SSH_KEY: ${{ secrets.SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$SSH_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          printf 'StrictHostKeyChecking no\nUserKnownHostsFile /dev/null\n' > ~/.ssh/config
          scp jackstockley@photo-server.internal.jstockley.com:~/infrastructure/trivy/trivy-results.sarif trivy-results.sarif
          ssh jackstockley@photo-server.internal.jstockley.com "rm -f ~/infrastructure/trivy/trivy-results.sarif"
          rm -f ~/.ssh/id_rsa
      - name: Step 4 - Tag SARIF results
        run: |
          jq '
            .runs |= map(
              .tool.driver.name = "trivy-host" |
              if .tool.driver.rules then
                .tool.driver.rules |= map(
                  .properties.tags = ((.properties.tags // []) + ["host", "photo-server"])
                )
              else . end
            )
          ' trivy-results.sarif > trivy-tagged.sarif && mv trivy-tagged.sarif trivy-results.sarif
      - name: Step 5 - Upload Trivy host scan results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'
          category: 'photo-server'

  cleanup-stale-image-scans:
    name: Cleanup Stale Image Scans
    needs: [discover-images, image-scan]
    if: always()
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
      actions: read
    steps:
      - name: Step 1 - Remove stale image scan categories
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          CURRENT_IMAGES: ${{ needs.discover-images.outputs.images }}
        run: |
          REPO="${{ github.repository }}"

          # Guard against an empty image list to avoid wiping everything
          if [ -z "$CURRENT_IMAGES" ] || [ "$CURRENT_IMAGES" = "[]" ]; then
            echo "No current images found, skipping cleanup."
            exit 0
          fi

          # Build the list of active stripped image names (no version tag)
          active_images=$(echo "$CURRENT_IMAGES" | jq -c '[.[] | gsub(":[^/:]+$"; "")]')

          # Collect every category that has ever been uploaded by an image scan
          all_categories=$(gh api "repos/$REPO/code-scanning/analyses" --paginate \
            | jq -r '[.[] | select(.tool.name == "trivy-image") | .category] | unique | .[]')

          if [ -z "$all_categories" ]; then
            echo "No existing image scan categories found, nothing to clean up."
            exit 0
          fi

          while IFS= read -r category; do

            # Strip any version tag from the category name for comparison
            category_no_tag=$(echo "$category" | sed 's/:[^/:]*$//')

            # Skip categories (after stripping version) that are still active
            if echo "$active_images" | jq -e --arg c "$category_no_tag" 'any(.[]; . == $c)' > /dev/null 2>&1; then
              echo "Active category, skipping: $category"
              continue
            fi

            echo "Removing stale category: $category"

            # Fetch all analysis IDs for this category, newest-to-oldest
            mapfile -t ids < <(gh api "repos/$REPO/code-scanning/analyses" --paginate \
              | jq -r --arg c "$category" \
                '[.[] | select(.category == $c)] | sort_by(.created_at) | reverse | .[].id')

            for id in "${ids[@]}"; do
              echo "  Deleting analysis $id"
              gh api --method DELETE "repos/$REPO/code-scanning/analyses/$id?confirm_delete"
            done
          done <<< "$all_categories"


  repo:
    permissions:
      contents: read  # for actions/checkout to fetch code
      security-events: write  # for github/codeql-action/upload-sarif to upload SARIF results
      actions: read  # only required for a private repository by github/codeql-action/upload-sarif to get the Action run status
    name: Repository Scan
    runs-on: ubuntu-latest
    steps:
      - name: Step 1 - Checkout code
        uses: actions/checkout@v6
      - name: Step 2 - Run Trivy vulnerability scanner on repository
        uses: aquasecurity/trivy-action@0.35.0
        with:
          scan-type: 'fs'
          ignore-unfixed: true
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'
      - name: Step 3 - Tag SARIF results
        run: |
          jq '.runs |= map(.tool.driver.name = "trivy-repo")' \
            trivy-results.sarif > trivy-tagged.sarif && mv trivy-tagged.sarif trivy-results.sarif
      - name: Step 4 - Upload Trivy repo scan results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: 'trivy-results.sarif'
