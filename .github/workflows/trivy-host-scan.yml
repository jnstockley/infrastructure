---
name: Trivy Linux Host Scanning

on:
  schedule:
    - cron: '0 7 * * 1'
  workflow_dispatch:

jobs:
  host-scan-racknerd:
    name: Host Scan - Racknerd
    runs-on: ubuntu-latest
    environment: racknerd
    permissions:
      contents: read
      security-events: write
      actions: read
      id-token: write  # Required for OIDC authentication

    steps:
      - name: Step 1 - Fetch secrets from Infisical
        uses: Infisical/secrets-action@v1.0.16
        with:
          method: "oidc"
          identity-id: "560c0540-b603-4725-a149-e1270a08a6db"
          domain: "https://secrets.jstockley.com"
          project-slug: "infrastructure"
          env-slug: "racknerd"

      - name: Step 2 - Run Trivy on Racknerd
        uses: jnstockley/gh-ssh-action@v1.2.15
        with:
          host: ${{ env.IP_ADDRESS }}
          username: jackstockley
          private_key: ${{ env.SSH_KEY }}
          command: cd ~/infrastructure/trivy && git reset --hard origin/main && git pull && docker compose up

      - name: Step 3 - Copy SARIF results from Racknerd and delete remote copy
        env:
          SSH_KEY: ${{ env.SSH_KEY }}
          SSH_HOST: ${{ env.IP_ADDRESS }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$SSH_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          printf 'StrictHostKeyChecking no\nUserKnownHostsFile /dev/null\n' > ~/.ssh/config
          scp jackstockley@"$SSH_HOST":~/infrastructure/trivy/trivy-results.sarif trivy-results.sarif
          ssh jackstockley@"$SSH_HOST" "rm -f ~/infrastructure/trivy/trivy-results.sarif"
          rm -f ~/.ssh/id_rsa

      - name: Step 4 - Tag SARIF results
        run: |
          jq '
            .runs |= map(
              .tool.driver.name = "trivy-host" |
              if .tool.driver.rules then
                .tool.driver.rules |= map(
                  .properties.tags = ((.properties.tags // []) + ["host", "racknerd"])
                )
              else . end
            )
          ' trivy-results.sarif > trivy-tagged.sarif && mv trivy-tagged.sarif trivy-results.sarif

      - name: Step 5 - Upload Trivy host scan results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'
          category: 'racknerd'

  host-scan-photo-server:
    name: Host Scan - Photo Server
    runs-on: ubuntu-latest
    environment: photo-server
    permissions:
      contents: read
      security-events: write
      actions: read
      id-token: write  # Required for OIDC authentication

    steps:
      - name: Step 1 - Fetch secrets from Infisical
        uses: Infisical/secrets-action@v1.0.16
        with:
          method: "oidc"
          identity-id: "560c0540-b603-4725-a149-e1270a08a6db"
          domain: "https://secrets.jstockley.com"
          project-slug: "infrastructure"
          env-slug: "photo-server"

      - name: Step 2 - WireGuard Connection
        run: |
          sudo apt-get update
          sudo apt-get install -y wireguard resolvconf
          echo "${{ env.VPN_CONFIG }}" > wg0.conf
          sudo chmod 600 wg0.conf
          sudo cp wg0.conf /etc/wireguard/
          sudo wg-quick up wg0

      - name: Step 3 - Run Trivy on Photo Server
        uses: jnstockley/gh-ssh-action@v1.2.15
        with:
          host: ${{ env.IP_ADDRESS }}
          username: jackstockley
          private_key: ${{ env.SSH_KEY }}
          command: cd ~/infrastructure/trivy && git reset --hard origin/main && git pull && docker compose up

      - name: Step 4 - Copy SARIF results from Photo Server and delete remote copy
        env:
          SSH_KEY: ${{ env.SSH_KEY }}
          SSH_HOST: ${{ env.IP_ADDRESS }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$SSH_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          printf 'StrictHostKeyChecking no\nUserKnownHostsFile /dev/null\n' > ~/.ssh/config
          scp jackstockley@"$SSH_HOST":~/infrastructure/trivy/trivy-results.sarif trivy-results.sarif
          ssh jackstockley@"$SSH_HOST" "rm -f ~/infrastructure/trivy/trivy-results.sarif"
          rm -f ~/.ssh/id_rsa

      - name: Step 5 - Tag SARIF results
        run: |
          jq '
            .runs |= map(
              .tool.driver.name = "trivy-host" |
              if .tool.driver.rules then
                .tool.driver.rules |= map(
                  .properties.tags = ((.properties.tags // []) + ["host", "photo-server"])
                )
              else . end
            )
          ' trivy-results.sarif > trivy-tagged.sarif && mv trivy-tagged.sarif trivy-results.sarif
      - name: Step 5 - Upload Trivy host scan results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'
          category: 'photo-server'
