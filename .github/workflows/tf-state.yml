---
name: Remote OpenTofu State
on:
  workflow_dispatch:

jobs:
  lint:
    name: Lint Open Tofu code
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up OpenTofu
        uses: opentofu/setup-opentofu@v2
        with:
          tofu_version_file: tf/.opentofu-version

      - name: Check format
        run: tofu fmt -recursive -check
