    runs-on: ubuntu-latest
    needs: [lint, changes]
    if: needs.changes.outputs.uptime-kuma == 'true'
    environment: uptime-kuma
    permissions:  # Needed for Infisical
      id-token: write  # Required for OIDC authentication
      contents: read   # Required for checking out code
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up OpenTofu
        uses: opentofu/setup-opentofu@v2
        with:
          tofu_version_file: tf/.opentofu-version

      - name: Fetch secrets from Infisical
        uses: Infisical/secrets-action@v1.0.16
        with:
          method: "oidc"
          identity-id: "646b2754-c197-462a-a2c3-9db2507b4b8e"
          domain: "https://secrets.jstockley.com"
          project-slug: "open-tofu"
          env-slug: "uptime-kuma"

      - name: Init Uptime Kuma
        run: |
          cd tf/uptime-kuma
          tofu init \
          -backend-config=address=${{env.TF_ADDRESS}} \
          -backend-config=lock_address=${{env.TF_ADDRESS}}/lock \
          -backend-config=unlock_address=${{env.TF_ADDRESS}}/lock \
          -backend-config=username=${{env.TF_USERNAME}} \
          -backend-config=password=${{env.TF_PASSWORD}} \
          -backend-config=lock_method=POST \
          -backend-config=unlock_method=DELETE \
          -backend-config=retry_wait_min=5 \
          -reconfigure \
          -upgrade

      - name: Validate Uptime Kuma
        run: |
          cd tf/uptime-kuma
          tofu validate

      - name: Setup WireGuard Connection
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
            sudo apt-get update
            sudo apt-get install -y wireguard resolvconf
            echo "${{ env.VPN_CONFIG }}" > wg0.conf
            sudo chmod 600 wg0.conf
            sudo cp wg0.conf /etc/wireguard/
            sudo wg-quick up wg0

      - name: Plan and Apply Uptime Kuma
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          TF_VAR_uptime_kuma_public_endpoint: ${{ env.UPTIME_KUMA_PUBLIC_ENDPOINT }}
          TF_VAR_uptime_kuma_public_username: ${{ env.UPTIME_KUMA_PUBLIC_USERNAME }}
          TF_VAR_uptime_kuma_public_password: ${{ env.UPTIME_KUMA_PUBLIC_PASSWORD }}
          TF_VAR_uptime_kuma_local_endpoint: ${{ env.UPTIME_KUMA_LOCAL_ENDPOINT }}
          TF_VAR_uptime_kuma_local_username: ${{ env.UPTIME_KUMA_LOCAL_USERNAME }}
          TF_VAR_uptime_kuma_local_password: ${{ env.UPTIME_KUMA_LOCAL_PASSWORD }}
          TF_VAR_smtp_password: ${{ env.SMTP_PASSWORD }}
          TF_VAR_nextcloud_talk_local_conversation_token: ${{ env.UPTIME_KUMA_LOCAL_CONVERSATION_TOKEN }}
          TF_VAR_nextcloud_talk_local_secret: ${{ env.UPTIME_KUMA_LOCAL_SECRET }}
          TF_VAR_gitlab_username: ${{ env.TF_USERNAME }}
          TF_VAR_gitlab_access_token: ${{ env.TF_PASSWORD }}
        run: |
          cd tf/uptime-kuma
          tofu plan -out=tfplan
          tofu apply -auto-approve tfplan
