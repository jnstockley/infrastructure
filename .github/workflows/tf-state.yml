          -backend-config=username=${{env.TF_USERNAME}} \
          -backend-config=password=${{env.TF_PASSWORD}} \
          -backend-config=lock_method=POST \
          -backend-config=unlock_method=DELETE \
          -backend-config=retry_wait_min=5 \
          -reconfigure \
          -upgrade

      - name: Validate Proxmox
        run: |
          cd tf/proxmox
          tofu validate

      - name: Setup WireGuard Connection
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
            sudo apt-get update
            sudo apt-get install -y wireguard resolvconf
            echo "${{ env.VPN_CONFIG }}" > wg0.conf
            sudo chmod 600 wg0.conf
            sudo cp wg0.conf /etc/wireguard/
            sudo wg-quick up wg0

      - name: Plan and Apply Proxmox
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          TF_proxmox_api_url: ${{ env.PROXMOX_API_URL }}
          TF_proxmox_api_user: ${{ env.PROXMOX_API_USER }}
          TF_proxmox_api_password: ${{ env.PROXMOX_API_PASSWORD }}
          TF_VAR_gitlab_username: ${{ env.TF_USERNAME }}
          TF_VAR_gitlab_access_token: ${{ env.TF_PASSWORD }}
        run: |
          cd tf/proxmox
          tofu plan -out=tfplan
        # tofu apply -auto-approve tfplan TODO - Uncomment when ready to apply Proxmox changes

  uptime-kuma:
